<aside class="sidebar" [class.open-drawer]="drawerOpen">

    <img class="brand-logo" src="/lsa-logo.png" alt="" width="32" height="32" decoding="async" />
    <div class="brand-text">
      <span class="brand-name">LeadScoring</span>
      <span class="brand-muted">Workspace</span>
